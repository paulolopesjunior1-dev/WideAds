<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>WideAds · Pipeline BDR/SDR</title><style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f1f5f9;color:#14202e;font-size:14px;-webkit-text-size-adjust:100%}
#app{max-width:1280px;margin:0 auto}
.hdr{background:#0E1B2D;color:#fff;padding:14px 16px 0;position:sticky;top:0;z-index:20}
.hdr-top{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.brand{font-weight:800;font-size:17px}.brand span{color:#9fb3c8;font-weight:500;font-size:13px}
.acts{display:flex;gap:6px;flex-wrap:wrap}
.btn{background:#17C07B;color:#062417;border:none;padding:7px 12px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer}
.btn.ghost{background:transparent;color:#cbd6e2;border:1px solid #2b4a63}
.btn.ghost.danger{color:#fda4a4;border-color:#7f3838}
.btn.sm{padding:4px 8px;font-size:12px}
.chips{display:flex;gap:8px;margin:12px 0 10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.chip{background:#17283f;border-radius:10px;padding:8px 12px;min-width:78px;text-align:center;flex:0 0 auto}
.chip b{display:block;font-size:20px;color:#fff}.chip span{font-size:11px;color:#9fb3c8}
.tabs{display:flex;gap:2px}
.tab{background:transparent;color:#9fb3c8;border:none;padding:11px 14px;font-weight:700;font-size:13px;cursor:pointer;border-bottom:3px solid transparent}
.tab.on{color:#fff;border-bottom-color:#17C07B}
.body{padding:14px 16px 60px}
.filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.inp{padding:8px 10px;border:1px solid #d8dee7;border-radius:8px;font-size:13px;background:#fff;color:#14202e}
.filters .inp{flex:1;min-width:120px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px;box-shadow:0 1px 3px rgba(15,30,50,.05)}
.card.nopad{padding:0;overflow:hidden}
.card-h{font-weight:800;font-size:14px;margin-bottom:10px;color:#0E1B2D}
.funnel{display:flex;flex-direction:column;gap:9px}
.frow{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.flabel{width:78px;font-weight:700;font-size:12px;color:#334155}
.fbarwrap{flex:1;min-width:120px;background:#eef2f7;border-radius:6px;height:24px;position:relative;overflow:hidden}
.fbar{height:100%;background:linear-gradient(90deg,#17C07B,#2CAFE0);border-radius:6px}
.fval{position:absolute;right:8px;top:3px;font-weight:800;font-size:13px;color:#0E1B2D}
.fmeta{font-size:11px;color:#64748b;width:100%;padding-left:88px}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;color:#64748b;font-size:11px;text-transform:uppercase;padding:5px 6px;border-bottom:1px solid #e2e8f0}
.tbl td{padding:6px;border-bottom:1px solid #f1f5f9}
.tbl .mut{color:#94a3b8}
.badge{font-size:10px;font-weight:800;padding:1px 6px;border-radius:6px;white-space:nowrap}
/* board */
.board{display:flex;gap:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px}
.col{flex:0 0 248px;background:#eef2f7;border-radius:12px;display:flex;flex-direction:column;max-height:calc(100vh - 230px)}
.col-h{font-weight:800;font-size:13px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:12px 12px 0 0}
.col-h .count{background:#0E1B2D;color:#fff;border-radius:10px;font-size:11px;padding:1px 8px}
.col-body{padding:8px;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.empty{color:#94a3b8;font-size:12px;text-align:center;padding:14px}
.lead{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:10px;cursor:pointer;transition:box-shadow .1s}
.lead:hover{box-shadow:0 2px 8px rgba(15,30,50,.1)}
.lead.lost{opacity:.5}
.lead-top{display:flex;justify-content:space-between;gap:6px;align-items:flex-start}
.lead-name{font-weight:700;font-size:13px;line-height:1.2}
.lead-sub{font-size:11px;color:#64748b;margin-top:3px}
.lead-meta{font-size:11px;color:#475569;margin-top:6px;display:flex;align-items:center;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.lead-actions{display:flex;gap:6px;margin-top:9px;justify-content:flex-end}
.mini{width:30px;height:28px;border:1px solid #d8dee7;background:#fff;border-radius:7px;cursor:pointer;font-size:13px;color:#334155}
.mini.go{background:#17C07B;color:#062417;border-color:#17C07B;font-weight:800}
/* data table */
.tablewrap{overflow-x:auto}
.data{width:100%;border-collapse:collapse;font-size:12.5px;white-space:nowrap}
.data thead th{position:sticky;top:0;background:#0E1B2D;color:#fff;font-size:11px;text-transform:uppercase;padding:9px 8px;text-align:left}
.data td{padding:6px 8px;border-bottom:1px solid #eef2f7}
.data tr.lost{opacity:.5}
.data .b{font-weight:700}
.cell{border:1px solid #e2e8f0;border-radius:6px;padding:3px 4px;font-size:12px;background:#fff}
.cell.stage{font-weight:700}
.hint{font-size:12px;color:#64748b;margin-top:8px}
.totrow{background:#fff7e6;font-weight:800}.totrow td{border-top:2px solid #B7791F}
.pbar{display:inline-block;width:60px;height:8px;background:#eef2f7;border-radius:4px;overflow:hidden;vertical-align:middle;margin-right:5px}
.pbar div{height:100%;background:#17C07B}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(8,16,28,.55);display:flex;align-items:center;justify-content:center;z-index:50;padding:14px}
.modal{background:#fff;border-radius:16px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-h{display:flex;justify-content:space-between;align-items:center;font-weight:800;font-size:16px;padding:16px;border-bottom:1px solid #eef2f7}
.x{background:none;border:none;font-size:18px;cursor:pointer;color:#64748b}
.modal-stage{display:flex;gap:5px;padding:12px 16px;flex-wrap:wrap;border-bottom:1px solid #eef2f7}
.sg{border:1px solid #d8dee7;background:#fff;border-radius:20px;padding:5px 11px;font-size:12px;font-weight:700;cursor:pointer;color:#475569}
.sg.on{background:var(--c);border-color:var(--c);color:#fff}
.form{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px}
.fld{display:flex;flex-direction:column;gap:4px}.fld.wide{grid-column:1/3}
.fld span{font-size:11px;color:#64748b;font-weight:600}
.modal-info{padding:0 16px 8px;font-size:12px;color:#64748b}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;padding:14px 16px;border-top:1px solid #eef2f7;flex-wrap:wrap}
.modal-foot .btn.ghost{border:1px solid #d8dee7;color:#334155}
.user{color:#cbd6e2;font-size:12px;align-self:center;margin-right:2px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.banner{background:#fef3c7;color:#92500e;font-size:12px;padding:7px 16px;text-align:center;border-bottom:1px solid #fde68a}
.banner.seed{background:#e7f6ee;color:#0E8F5C;border-color:#bfe8d2}
.banner .btn.sm{padding:3px 8px;font-size:12px;margin-left:6px}
.loginwrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0E1B2D;padding:18px}
.loginbox{background:#fff;border-radius:18px;padding:30px 26px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.loginbrand{font-weight:800;font-size:26px;color:#0E1B2D}
.loginsub{color:#64748b;font-size:13px;margin:2px 0 20px}
.loginform{display:flex;flex-direction:column;gap:12px}
.loginform .inp{padding:11px 12px;font-size:14px}
.loginerr{background:#fce4e4;color:#b42318;font-size:12px;padding:8px 10px;border-radius:8px}
.logininfo{background:#e4f7ed;color:#0f7a4d;font-size:12px;padding:8px 10px;border-radius:8px}
.btn.lg{padding:12px;font-size:15px;width:100%;margin-top:4px}
.loginalt{font-size:12px;color:#64748b;text-align:center}
.loginalt a{color:#17C07B;font-weight:700;cursor:pointer}
@media(max-width:760px){
  .grid2{grid-template-columns:1fr}
  .form{grid-template-columns:1fr}.fld.wide{grid-column:1}
  .brand{font-size:15px}.chip{min-width:64px}.chip b{font-size:17px}
}
</style></head>

  const cols=['id','nome','rede','vertical','regiao','fluxo','tier','score','motor','fonte','prioridade','sdr','stage','perdido','obs'];
  let out=cols.join(';')+'\n';
  leads.forEach(l=>{out+=cols.map(c=>('"'+String(l[c]==null?'':l[c]).replace(/"/g,'""')+'"')).join(';')+'\n';});
  dl('wideads_pipeline.csv', out, 'text/csv');
}
function dl(name,content,type){const b=new Blob([content],{type:type}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=name; a.click(); URL.revokeObjectURL(u);}
function importJSON(ev){const f=ev.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{try{const d=JSON.parse(r.result); if(Array.isArray(d)){leads=d.map(x=>Object.assign({},x)); nextId=Math.max.apply(null,leads.map(l=>l.id))+1; render();}}catch(e){alert('Arquivo inválido');}}; r.readAsText(f);}

function kpiChips(){
  const ativ=cnt(4), meta=M.annual['Ativação'];
  return `<div class="chips">
    <div class="chip"><b>${leads.length}</b><span>leads</span></div>
    <div class="chip"><b>${cnt(1)}</b><span>contatos</span></div>
    <div class="chip"><b>${cnt(3)}</b><span>assinaturas</span></div>
    <div class="chip"><b style="color:#17C07B">${ativ}</b><span>ativações</span></div>
    <div class="chip"><b>${meta}</b><span>meta ativação</span></div>

}
function tierBadge(t){const c=t==='Tier 1'?'#17C07B':(t==='Tier 2'?'#2CAFE0':'#94a3b8'); return `<span class="badge" style="background:${c}1a;color:${c};border:1px solid ${c}55">${t}</span>`;}
function selOpts(arr,val){return arr.map(o=>`<option ${o===val?'selected':''}>${esc(o)}</option>`).join('');}

function header(){
  const tabs=[['painel','Painel'],['pipeline','Pipeline'],['tabela','Leads'],['sdr','Por SDR']];
  if(isAdmin) tabs.push(['admin','Admin']);
  const user = (REMOTE && session) ? `<span class="user">${esc(session.user.email)}</span><button class="btn ghost" onclick="doLogout()">Sair</button>` : '';
  const banner = !REMOTE ? `<div class="banner">Modo local (sem login). Para ativar contas e dados compartilhados, configure o Supabase (veja o guia).</div>` : '';
  const seed = (REMOTE && session && leads.length===0) ? `<div class="banner seed">Base vazia. <button class="btn sm" onclick="seedBase()">Popular com os 174 PDVs do GTM</button></div>` : '';
  return `<div class="hdr">
    <div class="hdr-top">
      <div class="brand">WideAds <span>· Operação BDR/SDR</span></div>
      <div class="acts">
        ${user}
        <button class="btn ghost" onclick="exportCSV()">CSV</button>
        <button class="btn ghost" onclick="exportJSON()">Exportar</button>
        <label class="btn ghost">Importar<input type="file" accept="application/json" onchange="importJSON(event)" style="display:none"></label>
        <button class="btn" onclick="openAdd()">+ Lead</button>
      </div>
    </div>
    ${kpiChips()}
    <div class="tabs">${tabs.map(t=>`<button class="tab ${state.view===t[0]?'on':''}" onclick="setView('${t[0]}')">${t[1]}</button>`).join('')}</div>
  </div>${banner}${seed}`;
}
function filterbar(){
  const f=state.f;
  return `<div class="filters">
    <input class="inp" placeholder="Buscar PDV, rede, região..." value="${esc(f.q)}" oninput="setF('q',this.value)">
    <select class="inp" onchange="setF('sdr',this.value)"><option value="">SDR: todos</option>${selOpts(REPS,f.sdr)}</select>
    <select class="inp" onchange="setF('vertical',this.value)"><option value="">Vertical: todas</option>${selOpts(VERTS,f.vertical)}</select>

function renderPainel(){
  let h=`<div class="grid2">`;
  // funnel realizado vs meta
  h+=`<div class="card"><div class="card-h">Funil de realização · vs meta Ano 1</div><div class="funnel">`;
  const maxv=leads.length||1;
  FUNNEL.forEach(([name,idx])=>{
    const r = idx===0?leads.length:cnt(idx);
    const meta=M.annual[name], mm=M.monthly[name];
    const w=Math.max(4, Math.round(r/maxv*100));
    const pct=meta?Math.round(r/meta*100):0;
    h+=`<div class="frow"><div class="flabel">${name}</div>
      <div class="fbarwrap"><div class="fbar" style="width:${w}%"></div><span class="fval">${r}</span></div>
      <div class="fmeta">meta ${meta} · mês ${mm} · <b style="color:${pct>=100?'#17C07B':(pct>=50?'#B7791F':'#b42318')}">${pct}%</b></div></div>`;
  });
  h+=`</div></div>`;
  // conversões
  h+=`<div class="card"><div class="card-h">Taxas de conversão (realizada vs meta)</div><table class="tbl"><tr><th>Passagem</th><th>Real.</th><th>Meta</th></tr>`;
  const convs=[['Contato / Leads',1,0],['Reunião / Contato',2,1],['Assinatura / Reunião',3,2],['Ativação / Assinatura',4,3],['Retenção / Ativação',5,4]];
  const A=M.annual, names=['Leads','Contato','Reunião','Assinatura','Ativação','Retenção'];
  convs.forEach(([lb,a,b])=>{
    const ra=a===0?leads.length:cnt(a), rb=b===0?leads.length:cnt(b);
    const real=rb?ra/rb:0; const meta=A[names[b]]?A[names[a]]/A[names[b]]:0;
    h+=`<tr><td>${lb}</td><td><b>${(real*100).toFixed(0)}%</b></td><td class="mut">${(meta*100).toFixed(0)}%</td></tr>`;
  });
  h+=`</table></div>`;
  // leads por fonte
  h+=`<div class="card"><div class="card-h">Leads por fonte</div><table class="tbl"><tr><th>Fonte</th><th>Leads</th><th>%</th></tr>`;
  FONTES.forEach(fn=>{const n=leads.filter(l=>l.fonte===fn).length; if(n===0&&fn!=='Marketing'&&fn!=='Growth')return; h+=`<tr><td>${fn}</td><td><b>${n}</b></td><td class="mut">${leads.length?Math.round(n/leads.length*100):0}%</td></tr>`;});
  h+=`</table></div>`;
  // por SDR resumo
  h+=`<div class="card"><div class="card-h">Resumo por SDR</div><table class="tbl"><tr><th>SDR</th><th>Leads</th><th>Cont.</th><th>Reun.</th><th>Assin.</th><th>Ativ.</th></tr>`;
  REPS.forEach(rep=>{const a=leads.filter(l=>l.sdr===rep); h+=`<tr><td>${rep}</td><td>${a.length}</td><td>${cnt(1,a)}</td><td>${cnt(2,a)}</td><td>${cnt(3,a)}</td><td><b style="color:#17C07B">${cnt(4,a)}</b></td></tr>`;});
  h+=`</table></div>`;
  h+=`</div>`;
  return h;
}

function card(l){
  const st=STAGES[SI[l.stage]];
  const pc=l.prioridade==='Alta'?'#b42318':(l.prioridade==='Média'?'#B7791F':'#94a3b8');
  return `<div class="lead ${l.perdido?'lost':''}" onclick="openEdit(${l.id})">
    <div class="lead-top"><div class="lead-name">${esc(l.nome)}</div>${tierBadge(l.tier)}</div>
    <div class="lead-sub">${esc(l.rede)} · ${esc(l.vertical)}</div>
    <div class="lead-meta"><span class="dot" style="background:${pc}"></span>${l.prioridade} · ${esc(l.sdr)} · score ${l.score}</div>
    <div class="lead-actions" onclick="event.stopPropagation()">
      <button class="mini" onclick="move(${l.id},-1)" title="voltar">◀</button>
      <button class="mini" onclick="togglePerdido(${l.id})" title="perdido">${l.perdido?'↺':'✕'}</button>
      <button class="mini go" onclick="move(${l.id},1)" title="avançar">▶</button>
    </div></div>`;
}
function renderPipeline(){
  const arr=filtered();
  let h=`<div class="board">`;
  STAGES.forEach((s,i)=>{
    const items=arr.filter(l=>l.stage===s.k);
    h+=`<div class="col"><div class="col-h" style="border-top:3px solid ${s.color}">${s.label}<span class="count">${items.length}</span></div><div class="col-body">`;
    h+=items.map(card).join('')||`<div class="empty">vazio</div>`;
    h+=`</div></div>`;
  });
  h+=`</div>`;
  return h;
}

async function addRep(){
  const name=(newRepName||'').trim();
  if(!name){return;}
  if(REPS.includes(name)){ newRepName=''; return render(); }
  REPS.push(name); newRepName='';
  await saveSettings();
  render();
}
async function removeRep(name){
  if(!confirm(`Remover ${name} da lista de SDR/BDR? Leads já atribuídos a ${name} continuam no histórico, mas ele(a) some das listas e filtros.`)) return;
  const idx=REPS.indexOf(name); if(idx>-1) REPS.splice(idx,1);
  await saveSettings();
  render();
}
async function saveMetas(){
  document.querySelectorAll('[data-meta]').forEach(inp=>{
    const path=inp.getAttribute('data-meta').split('.'); const v=Number(inp.value)||0;
    if(path.length===1) M[path[0]]=v; else M[path[0]][path[1]]=v;
  });
  await saveSettings();
  loginInfo='Metas salvas.'; loginErr='';
  render();
}
async function saveSettings(){
  if(!REMOTE || !sb) return;
  const {error}=await sb.from('settings').update({reps:REPS, metas:M, updated_at:new Date().toISOString()}).eq('id',1);
  if(error){ loginErr='Erro ao salvar: '+error.message; loginInfo=''; render(); }
}

function renderSDR(){
  let h=`<div class="card nopad"><div class="tablewrap"><table class="data"><thead><tr><th>SDR / BDR</th><th>Leads</th><th>Contato</th><th>Reunião</th><th>Assinatura</th><th>Ativação</th><th>Retenção</th><th>Meta ativ.</th><th>% meta</th></tr></thead><tbody>`;
  let tot=[0,0,0,0,0,0];
  REPS.forEach(rep=>{
    const a=leads.filter(l=>l.sdr===rep);
    const v=[a.length,cnt(1,a),cnt(2,a),cnt(3,a),cnt(4,a),cnt(5,a)];
    v.forEach((x,i)=>tot[i]+=x);
    const pct=M.perRepAtiv?Math.round(v[4]/M.perRepAtiv*100):0;
    h+=`<tr><td class="b">${rep}</td>${v.map(x=>`<td>${x}</td>`).join('')}<td class="mut">${M.perRepAtiv}</td><td><div class="pbar"><div style="width:${Math.min(100,pct)}%"></div></div><span>${pct}%</span></td></tr>`;
  });
  const tpct=Math.round(tot[4]/M.annual['Ativação']*100);
  h+=`<tr class="totrow"><td class="b">Time</td>${tot.map(x=>`<td>${x}</td>`).join('')}<td>${M.annual['Ativação']}</td><td>${tpct}%</td></tr>`;
  h+=`</tbody></table></div></div>
   <div class="card"><div class="card-h">Taxas de conversão por SDR</div><table class="tbl"><tr><th>SDR</th><th>Cont/Lead</th><th>Reun/Cont</th><th>Assin/Reun</th><th>Ativ/Assin</th></tr>`;
  REPS.forEach(rep=>{const a=leads.filter(l=>l.sdr===rep); const c=[a.length,cnt(1,a),cnt(2,a),cnt(3,a),cnt(4,a)];
    const r=(x,y)=>y?Math.round(x/y*100)+'%':'-';
    h+=`<tr><td>${rep}</td><td>${r(c[1],c[0])}</td><td>${r(c[2],c[1])}</td><td>${r(c[3],c[2])}</td><td>${r(c[4],c[3])}</td></tr>`;});
  h+=`</table></div>`;
  return h;
}

      <label class="fld wide"><span>Próximo passo / obs</span><input class="inp" value="${esc(l.obs)}" onchange="setField(${l.id},'obs',this.value)"></label>

function render(){
  let body='';
  if(state.view==='painel') body=renderPainel();
  else if(state.view==='pipeline') body=filterbar()+renderPipeline();
  else if(state.view==='tabela') body=filterbar()+renderTabela();
  else if(state.view==='sdr') body=renderSDR();
  else if(state.view==='admin') body=renderAdmin();
  let modal=''; if(state.edit) modal=modalEdit(); else if(state.adding) modal=modalAdd();
  document.getElementById('app').innerHTML = header()+`<div class="body">${body}</div>`+modal;
}

async function doReset(){
  loginErr=''; loginInfo=''; const email=val('l_email');
  if(!email){loginErr='Informe seu e-mail.'; return renderLogin();}
  try{
    const res=await sb.auth.resetPasswordForEmail(email, {redirectTo: location.href.split('#')[0]});
    if(res.error){ loginErr=res.error.message; return renderLogin(); }
    loginInfo='Se o e-mail existir, enviamos um link para redefinir a senha.'; renderLogin();
  }catch(e){ loginErr='Falha de conexão.'; renderLogin(); }
}
async function doAuth(){
  loginErr=''; const email=val('l_email'), password=val('l_pass');
  if(!email||!password){loginErr='Preencha e-mail e senha.'; return renderLogin();}
  try{
    let res;
    if(loginMode==='up'){ res=await sb.auth.signUp({email,password}); }
    else { res=await sb.auth.signInWithPassword({email,password}); }
    if(res.error){ loginErr=res.error.message; return renderLogin(); }
    if(loginMode==='up' && !res.data.session){ loginErr='Conta criada. Confirme o e-mail (se exigido) e entre.'; loginMode='in'; return renderLogin(); }
  }catch(e){ loginErr='Falha de conexão.'; renderLogin(); }
}
function renderNewPassword(){
  document.getElementById('app').innerHTML = `<div class="loginwrap"><div class="loginbox">
    <div class="loginbrand">WideAds</div>
    <div class="loginsub">Defina sua nova senha</div>
    <div class="loginform">
      <label class="fld"><span>Nova senha</span><input class="inp" id="l_newpass" type="password" autocomplete="new-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doSetNewPassword()"></label>
      ${loginErr?`<div class="loginerr">${esc(loginErr)}</div>`:''}
      ${loginInfo?`<div class="logininfo">${esc(loginInfo)}</div>`:''}
      <button class="btn lg" onclick="doSetNewPassword()">Salvar nova senha</button>
    </div>
  </div></div>`;
}
async function doSetNewPassword(){
  loginErr=''; loginInfo=''; const password=val('l_newpass');
  if(!password||password.length<6){loginErr='A senha deve ter ao menos 6 caracteres.'; return renderNewPassword();}
  try{
    const res=await sb.auth.updateUser({password});
    if(res.error){ loginErr=res.error.message; return renderNewPassword(); }
    loginInfo='Senha atualizada! Carregando...';
    renderNewPassword();
    await loadAll(); subscribe(); render();
  }catch(e){ loginErr='Falha de conexão.'; renderNewPassword(); }
}
async function doLogout(){ if(sb) await sb.auth.signOut(); }
async function loadLeads(){ const {data,error}=await sb.from('leads').select('*').order('id'); if(error){console.warn('load',error.message); leads=[];} else leads=data||[]; }
async function seedBase(){ const rows=DATA.leads.map(({id,...r})=>r); const {error}=await sb.from('leads').insert(rows); if(error)alert('Erro ao popular: '+error.message); await loadLeads(); render(); }
async function loadSettings(){
  const {data:adminRows}=await sb.from('admins').select('email');
  isAdmin = !!(adminRows && session && adminRows.some(r=>r.email===session.user.email));
  const {data:row}=await sb.from('settings').select('*').eq('id',1).maybeSingle();
  if(row){
    if(Array.isArray(row.reps) && row.reps.length){ REPS.length=0; REPS.push(...row.reps); }
    if(row.metas && Object.keys(row.metas).length){ Object.assign(M, row.metas); }
  }
}
async function loadAll(){ await Promise.all([loadLeads(), loadSettings()]); }
let subscribed=false;
function subscribe(){
  if(subscribed)return; subscribed=true;
  sb.channel('leads-rt').on('postgres_changes',{event:'*',schema:'public',table:'leads'},()=>{ loadLeads().then(render); }).subscribe();
  sb.channel('settings-rt').on('postgres_changes',{event:'*',schema:'public',table:'settings'},()=>{ loadSettings().then(render); }).subscribe();
}
function loadSB(){ return new Promise((res,rej)=>{ if(window.supabase)return res(); const s=document.createElement('script'); s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'; s.onload=res; s.onerror=()=>rej(new Error('cdn')); document.head.appendChild(s); }); }
async function boot(){
  if(!REMOTE){ render(); return; }
  document.getElementById('app').innerHTML='<div class="loginwrap"><div class="loginbox"><div class="loginbrand">WideAds</div><div class="loginsub">Carregando...</div></div></div>';
  try{ await loadSB(); }catch(e){ document.getElementById('app').innerHTML='<div class="loginwrap"><div class="loginbox"><div class="loginbrand">WideAds</div><div class="loginerr">Sem conexão com o servidor de login. Verifique a internet.</div></div></div>'; return; }
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const {data:{session:s}} = await sb.auth.getSession(); session=s;
  sb.auth.onAuthStateChange((_e,s2)=>{
    session=s2;
    if(_e==='PASSWORD_RECOVERY'){ renderNewPassword(); return; }
    if(session){ loadAll().then(()=>{subscribe(); render();}); } else { subscribed=false; isAdmin=false; renderLogin(); }
  });
  if(session){ await loadAll(); subscribe(); render(); } else { renderLogin(); }
}
boot();
</script></body></html>
